# application.properties

server.port=${PORT:5005}

# Database Configuration using env variables from Node.js
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:gocomet_auction}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Jackson Naming Strategy for Snake Case
spring.jackson.property-naming-strategy=SNAKE_CASE

# Fix for N+1 issues and general performance
spring.jpa.properties.hibernate.default_batch_fetch_size=100
